version: '3.8'
services:
  backend:
    build: ./backend
    ports:
      - "3001:3001"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SUPABASE_URL=${VITE_SUPABASE_URL}
      - SUPABASE_KEY=${VITE_SUPABASE_ANON_KEY}

  frontend:
    build: ./frontend
    ports:
  - "8081:80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:3001